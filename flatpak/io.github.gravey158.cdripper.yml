# cdripper Flatpak-Manifest.
#
# Baut alle nicht-Runtime-Deps aus Quelle gegen org.kde.Sdk//6.7 — die KDE-
# Platform liefert Qt6 + glibc + libcurl + libstdc++ ABI-stabil. Damit
# entfällt das Cross-Distro-libcrypt-Drama, das AppImage-Builds auf Bazzite
# zerlegt hat.
#
# Verwendete Git-Quellen statt Tarballs: tag-pinned, kein SHA256 nötig,
# einfach updatebar (Tag bumpen).
#
# Build (auf Bazzite-Distrobox `ripper`):
#   scripts/build-flatpak.sh
#
# Publish:
#   flatpak build-bundle <repo> cdripper.flatpak io.github.gravey158.cdripper
#   kubectl -n flatpak-repo cp <ostree-export> ...:/repo/
app-id: io.github.gravey158.cdripper
runtime: org.kde.Platform
runtime-version: '6.7'
sdk: org.kde.Sdk
command: cdripper

# Sandbox-Berechtigungen. Minimal aber funktionsfähig.
finish-args:
  # CD-/optische Laufwerke (/dev/sr*, /dev/cdrom-symlinks)
  - --device=all
  # MusicBrainz, AcoustID, LRCLib, Nextcloud-Upload
  - --share=network
  # Qt-X11-Shared-Memory
  - --share=ipc
  # GUI
  - --socket=wayland
  - --socket=fallback-x11
  # Speicher-Ziel: User-Music/Downloads. Volle home-Bereich wäre overkill —
  # cdripper schreibt nur unter ~/Music/cdripper (Default) bzw. einem in der
  # Settings konfigurierten Pfad. xdg-music ist Standard-Music-Verzeichnis.
  - --filesystem=xdg-music
  - --filesystem=xdg-download
  # Settings unter ~/.config/cdripper (Flatpak gibt eh nur xdg-config-Slice frei)
  # Konfig + Archiv-DB liegt unter ~/.var/app/io.github.gravey158.cdripper/config
  # automatisch — kein zusätzlicher Permissions-Eintrag nötig.
  - --talk-name=org.freedesktop.Notifications

cleanup:
  # Header + statische Libs nicht ins Final-Bundle
  - /include
  - /lib/pkgconfig
  - /lib/cmake
  - /share/aclocal
  - /share/man
  - '*.la'
  - '*.a'

modules:
  # libcdio: CD-IO-API. CLI-Tools in src/ haben unconditional help2man-
  # Makefile-Target, das im SDK-Sandbox bricht (kein help2man drin). Wir
  # bauen explizit nur lib/ — cdripper linkt nur gegen die libs.
  - name: libcdio
    buildsystem: simple
    # KDE-Sdk hat weder help2man (für src/) noch texinfo+version.texi (für
    # doc/). Beide Subdirs überspringen, nur lib/ bauen — wir brauchen nur
    # die Shared Libs + Header + pkgconfig-Files.
    build-commands:
      - autoreconf -fiv
      - ./configure --prefix=/app --libdir=/app/lib --disable-static --disable-cxx --disable-example-progs --disable-cpp-progs
      - make -j$(nproc) -C lib
      - make -C lib install
      # Header und .pc-Files: include/ und ggf. top-level installieren.
      - make -C include install
      - install -d /app/lib/pkgconfig
      - find . -maxdepth 3 -name '*.pc' -exec install -m644 {} /app/lib/pkgconfig/ \;
    sources:
      - type: git
        url: https://git.savannah.gnu.org/git/libcdio.git
        tag: release-2.1.0

  # libcdio_paranoia: Sample-genaues Lesen, AccurateRip-Basis. Upstream-Repo
  # lebt bei rocky/libcdio-paranoia auf GitHub (savannah hat es nicht als
  # separates git-Repo).
  - name: libcdio-paranoia
    buildsystem: simple
    # Selbe Strategie wie libcdio — nur lib/ bauen.
    build-commands:
      - autoreconf -fiv
      - ./configure --prefix=/app --libdir=/app/lib --disable-static --disable-example-progs
      - make -j$(nproc) -C lib
      - make -C lib install
      - make -C include install
      - install -d /app/lib/pkgconfig
      - find . -maxdepth 3 -name '*.pc' -exec install -m644 {} /app/lib/pkgconfig/ \;
    sources:
      - type: git
        url: https://github.com/rocky/libcdio-paranoia.git
        tag: release-10.2+2.0.2

  # libdiscid: MusicBrainz Disc-ID-Berechnung (TOC-Hash).
  - name: libdiscid
    buildsystem: cmake-ninja
    config-opts:
      - -DBUILD_SHARED_LIBS=ON
      - -DBUILD_TESTS=OFF
    sources:
      - type: git
        url: https://github.com/metabrainz/libdiscid.git
        tag: v0.6.4

  # nlohmann/json: header-only — install via CMake.
  - name: nlohmann-json
    buildsystem: cmake-ninja
    config-opts:
      - -DJSON_BuildTests=OFF
      - -DJSON_MultipleHeaders=OFF
    sources:
      - type: git
        url: https://github.com/nlohmann/json.git
        tag: v3.11.3

  # FLAC: liefert libFLAC + CLI-Tools flac/metaflac. Cdripper's Pipeline
  # ruft `flac` und `metaflac` via std::system auf — beide MÜSSEN im
  # $PATH des Flatpak-Sandboxen liegen.
  - name: flac
    buildsystem: cmake-ninja
    config-opts:
      - -DBUILD_SHARED_LIBS=ON
      - -DBUILD_TESTING=OFF
      - -DBUILD_EXAMPLES=OFF
      - -DBUILD_DOCS=OFF
      - -DINSTALL_MANPAGES=OFF
    sources:
      - type: git
        url: https://github.com/xiph/flac.git
        tag: 1.4.3

  # Opus-Stack: libogg → libopus → libopusenc → opus-tools (liefert opusenc CLI).
  - name: libogg
    buildsystem: cmake-ninja
    config-opts:
      - -DBUILD_SHARED_LIBS=ON
      - -DBUILD_TESTING=OFF
      - -DINSTALL_DOCS=OFF
    sources:
      - type: git
        url: https://github.com/xiph/ogg.git
        tag: v1.3.5

  - name: libopus
    buildsystem: cmake-ninja
    config-opts:
      - -DBUILD_SHARED_LIBS=ON
      - -DBUILD_TESTING=OFF
      - -DOPUS_BUILD_PROGRAMS=OFF
    sources:
      - type: git
        url: https://github.com/xiph/opus.git
        tag: v1.5.2

  - name: libopusenc
    buildsystem: autotools
    config-opts:
      - --disable-static
      - --disable-examples
      - --disable-doc
    sources:
      - type: git
        url: https://github.com/xiph/libopusenc.git
        tag: v0.2.1

  - name: opus-tools
    buildsystem: autotools
    config-opts:
      - --disable-static
    sources:
      - type: git
        url: https://github.com/xiph/opus-tools.git
        tag: v0.2

  # LAME: MP3-Encoder. Github-Mirror weil sourceforge keine git-Tags
  # standardisiert exponiert.
  - name: lame
    buildsystem: simple
    # Frontend (`lame` CLI) braucht termcap-Symbole (`tgetstr`). Modernes
    # ncurses splittet die in libtinfo — explizit zu LDFLAGS hinzufügen.
    build-commands:
      - ./configure --prefix=/app --libdir=/app/lib --disable-static LDFLAGS="-ltinfo"
      - make -j$(nproc)
      - make install
    sources:
      - type: archive
        url: https://downloads.sourceforge.net/project/lame/lame/3.100/lame-3.100.tar.gz
        sha256: ddfe36cab873794038ae2c1210557ad34857a4b6bdc515785d1da9e175b1da1e

  # TagLib: rsgain liest/schreibt Tags damit. Build-Dep für rsgain.
  - name: taglib
    buildsystem: cmake-ninja
    config-opts:
      - -DBUILD_SHARED_LIBS=ON
      - -DBUILD_TESTING=OFF
      - -DBUILD_EXAMPLES=OFF
    sources:
      - type: git
        url: https://github.com/taglib/taglib.git
        tag: v2.0.2

  # libebur128: EBU R128 Loudness-Algorithmus. Build-Dep für rsgain.
  - name: libebur128
    buildsystem: cmake-ninja
    config-opts:
      - -DBUILD_SHARED_LIBS=ON
      - -DENABLE_INTERNAL_QUEUE_H=ON
    sources:
      - type: git
        url: https://github.com/jiixyj/libebur128.git
        tag: v1.2.6

  # fmt: C++ Formatting-Library, Build-Dep für rsgain.
  - name: fmt
    buildsystem: cmake-ninja
    config-opts:
      - -DBUILD_SHARED_LIBS=ON
      - -DFMT_TEST=OFF
      - -DFMT_DOC=OFF
    sources:
      - type: git
        url: https://github.com/fmtlib/fmt.git
        tag: 10.2.1

  # inih: kleiner INI-Parser, Build-Dep für rsgain (Config-File-Reader).
  - name: inih
    buildsystem: meson
    config-opts:
      - -Ddefault_library=shared
      - -Ddistro_install=true
    sources:
      - type: git
        url: https://github.com/benhoyt/inih.git
        tag: r58

  # rsgain: ReplayGain 2.0 + EBU R128 für FLAC/Opus/MP3. cdripper-Pipeline
  # ruft `rsgain easy <dir>` nach jedem Album-Rip. Hängt von ffmpeg
  # (libavcodec/format) — wenn die KDE-Platform-Runtime kein ffmpeg
  # mitbringt, scheitert dieses Modul; dann fällt v1.7.2 auf rsgain-skip
  # zurück (Tag-Schreiben weiterhin durch metaflac).
  - name: rsgain
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    sources:
      - type: git
        url: https://github.com/complexlogic/rsgain.git
        tag: v3.5.1

  # cdripper selbst. Quelle = Repo-Wurzel (../).
  - name: cdripper
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    sources:
      - type: dir
        path: ..
        skip:
          - build
          - build-flatpak
          - .git
    post-install:
      # builddir=true → PWD ist <source>/_flatpak_build; Pfade relativ über ../
      - install -Dm644 ../flatpak/cdripper.desktop /app/share/applications/io.github.gravey158.cdripper.desktop
      - install -Dm644 ../flatpak/cdripper.png /app/share/icons/hicolor/256x256/apps/io.github.gravey158.cdripper.png
      - install -Dm644 ../flatpak/cdripper.appdata.xml /app/share/metainfo/io.github.gravey158.cdripper.appdata.xml
