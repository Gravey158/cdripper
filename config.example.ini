# cdripper Konfiguration — kopieren nach ~/.config/cdripper/config.ini
#   mkdir -p ~/.config/cdripper
#   cp config.example.ini ~/.config/cdripper/config.ini
#   chmod 600 ~/.config/cdripper/config.ini      # enthält ein Passwort!
#
# Das WebDAV-Passwort NICHT committen. Alternativ via Umgebungsvariable:
#   export CDRIPPER_WEBDAV_PASS='...'   (überschreibt webdav_pass aus dieser Datei)

device         = /dev/sr0
nextcloud_url  = https://n1-k58z.x2-pandora.de
webdav_user    = cabanskid

# Nextcloud → Persönliche Einstellungen → Sicherheit → "App-Passwort erstellen"
# (NICHT das Login-Passwort verwenden). Hier eintragen oder per Env setzen:
webdav_pass    =

# Zielordner relativ zum WebDAV-Root des Users. Navidrome liest aus
# .../files/cabanskid/Music — daher "Music".
music_root     = Music

tmpdir         = /tmp/cdripper

# MusicBrainz verlangt einen aussagekräftigen User-Agent mit Kontakt.
musicbrainz_useragent = athena-cdripper/1.0 ( gravemind158@gmail.com )

# Lese-Speed. 0 = Laufwerks-Default (volle Geschwindigkeit, schnellster Rip
# für saubere CDs). Bei ZERKRATZTEN Discs kleiner setzen (z.B. 8 oder 4) —
# langsameres Lesen verbessert die Fehlerkorrektur deutlich. Unlesbare
# Sektoren werden pro Track gemeldet (= hörbare Aussetzer wahrscheinlich).
read_speed = 0

# Upload-Versuche pro Datei/Ordner bei transienten WebDAV-/Netzfehlern
# (Backoff 2s, 4s, …). 1 = kein Retry.
upload_retries = 3

# ReplayGain-2.0/R128 *Track*-Gain-Tags via rsgain schreiben (in-place, vor
# Upload). Track- statt Album-Gain ist für Sampler korrekt (jeder Song aus
# einem anderen Album). true/false.
replaygain = true

# Jukebox: GUI startet automatisch sobald eine Disc erkannt wird (kein
# Start-Klick) — praktisch fürs Stapel-Digitalisieren. true/false.
jukebox = false

# Schnell-Rip: erst zügiger OVERLAP-Pass, FULL nur für Tracks mit
# Lesefehlern (~3× schneller bei sauberen CDs). true/false.
fast_rip = false

# AccurateRip-Prüfung (advisory: bestätigt den Rip gegen die DB anderer
# Ripper). true/false.
accuraterip = true

# Manueller Drive-Sample-Offset (Fallback). Pro Laufwerk kalibrierte Werte
# (drive_offsets.ini, neben dieser Datei) haben Vorrang. Kalibrieren via
# 'cdripper --calibrate' oder GUI → Einstellungen → AccurateRip.
read_offset = 0

# ── Upload-Backend ────────────────────────────────────────────────────────────
# webdav (Nextcloud, Default) | local | ssh | smb
# music_root ist überall der Unterordner unter der jeweiligen Basis.
upload_backend = webdav

# local: in einen lokalen Pfad / gemounteten Share schreiben
local_base =

# ssh: mkdir -p + scp auf einen Host (BatchMode → SSH-Key nötig)
ssh_host =
ssh_user =
ssh_base =
ssh_port = 22

# smb: smb://host/share/Basis  (via smbclient, kein Mount nötig)
smb_url =
smb_user =
smb_pass =
